name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    strategy:
      matrix:
        include:
          - runner: macos-15
            architecture: arm64
          - runner: macos-15-intel
            architecture: x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Verify release tag
        run: test "v$(node -p "require('./package.json').version")" = "$GITHUB_REF_NAME"
      - run: pnpm check
      - run: pnpm test
      - run: pnpm package:release
      - uses: actions/upload-artifact@v4
        with:
          name: klack-darwin-${{ matrix.architecture }}
          path: |
            release/*.tar.gz
            release/*.sha256
          if-no-files-found: error

  publish:
    needs: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          pattern: klack-darwin-*
          path: release
          merge-multiple: true
      - name: Assemble checksums
        run: |
          LC_ALL=C cat release/*.sha256 | sort -k2 > release/checksums.txt
          rm release/*.sha256
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" release/* --generate-notes --verify-tag --repo "$GITHUB_REPOSITORY"
